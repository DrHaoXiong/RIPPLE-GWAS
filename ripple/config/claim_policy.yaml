thresholds:
  final_z_threshold: 2.5
  supportive_z_threshold: 2.0
empirical_p:
  formula: "(1 + exceedances_at_least_as_extreme_as_observed) / (1 + n_null)"
  default_statistic_direction: greater_is_more_extreme
claim_status:
  - final_positive
  - supportive
  - negative
  - not_tested
exclusion_or_na_reason:
  - none
  - not_applicable
  - insufficient_nulls
  - missing_input
  - poor_graph_coverage
  - low_gene_overlap
  - low_information_trait
  - not_run
  - excluded_region_sensitivity
  - method_not_supported
not_tested_reason:
  - not_applicable
  - missing_input
  - not_run
  - missing_required_input
  - insufficient_graph_coverage
  - insufficient_gene_overlap
  - null_sd_zero
  - not_applicable_to_graph_role
  - not_run_v0_1
  - computationally_deferred
  - method_not_supported
  - failed_qc
  - deferred_to_submission_stage
graph_role:
  - primary
  - sensitivity
  - exploratory
annotation_source_type:
  - independent_external
  - graph_construction_related
  - internal_support
statistic_direction:
  - greater_is_more_extreme
  - less_is_more_extreme
  - two_sided
allowed_strength:
  - final
  - exploratory
  - supportive
  - negative
  - limitation
module_label:
  - post_hoc_candidate_only
  - fixed_module_supported
  - selection_calibrated_module
  - calibrated_candidate_module
  - degree_robust_candidate_module
  - topology_specific_module
  - no_local_module_support
  - not_tested
  - raw_enrichment_component
  - distributed_weak_signal_module_candidate
  - mixed_sparse_distributed_candidate
  - moderate_locus_supported_module
  - module_specific_rank_supported_module
  - top_locus_dominant_module
  - sparse_locus_pathway_overlap
  - raw_gene_set_enrichment_only
  - null_degraded_unresolved
  - negative
forbidden_language:
  - causal disease topology
  - causal network
  - true disease module
  - validated STRING topology
  - STRING validates
  - topology-specific discovery
  - disease-specific topology
  - drug target discovery
  - therapeutic target
context_check_language:
  - module
  - network
  - diffusion
  - graph-domain
  - candidate
  - prioritize
module_layer_controlled_phrases:
  - calibrated candidate module
  - module discovery
  - local module discovery
  - disease module
  - validated module
  - validated disease module
  - topology-specific module
  - topology-specific discovery
tier_interpretation:
  TIER_0_gene_signal: gene-score pipeline signal
  TIER_1_degree_calibrated_aggregation: degree-calibrated top-rank weak-signal aggregation
  TIER_2_graph_domain_aggregation: graph-domain diffusion aggregation
  TIER_3_topology_specific_support: topology-specific graph support
  TIER_4_local_calibrated_modules: local calibrated candidate modules
graph_claim_policy:
  STRING_default:
    graph_role: primary
    allowed_claim_level: Tier 1-3
  retina_string_min20:
    graph_role: sensitivity
    allowed_claim_level: Tier 2 graph-domain only
  FVM_vascular_weighted:
    graph_role: sensitivity
    allowed_claim_level: graph-domain support only; no topology-specific claim unless preregistered graph-null support exists
module_layer_policy:
  tier_name: "Tier 4"
  tier_description: "Local module nomination and module-level calibration"
  empirical_p_formula: "(1 + number of null statistics at least as extreme as observed) / (1 + n_null)"
  default_thresholds:
    fixed_module_support_empirical_p: 0.05
    selection_calibrated_empirical_p: 0.05
    topology_specific_module_empirical_p: 0.05
  module_status_levels:
    post_hoc_candidate_only:
      manuscript_role: "exploratory_follow_up"
    fixed_module_supported:
      manuscript_role: "supportive_only"
    selection_calibrated_module:
      manuscript_role: "module_level_final_positive"
    topology_specific_module:
      manuscript_role: "topology_specific_module_claim"
    no_local_module_support:
      manuscript_role: "negative_or_limitation"
    not_tested:
      manuscript_role: "not_tested"
  multiple_testing:
    full_reselection_null_controls: "max-module family under the tested trait, graph, score source, top-fraction grid, module filters, and module statistic"
    fixed_module_support_controls: "fixed candidate module only; does not control full post hoc discovery"
  upgrade_rules:
    post_hoc_to_fixed_module_supported: "requires fixed-module empirical support"
    fixed_to_selection_calibrated: "requires full reselection max-module empirical p below threshold"
    selection_to_topology_specific: "requires module-level degree-preserving graph null support"
  downgrade_rules:
    full_reselection_empirical_p_ge_0_05: "downgrade to post_hoc_candidate_only or fixed_module_supported depending on fixed-module null"
    degree_preserving_graph_null_negative: "no topology-specific module claim"
  ripple_d_v1_3:
    tier_name: "Tier 4D"
    tier_description: "Locus-aware robust distributed weak-signal module diagnostics"
    old_raw_statistic_role: "raw_enrichment_component"
    primary_statistic: "RIPPLE-D locus-aware robust distributed module statistic"
    locus_definition_default: "gene-coordinate pseudo-locus, +/-500kb merged intervals"
    distributed_gate:
      locus_robust_empirical_p_lt: 0.05
      moderate_locus_burden_empirical_p_lt: 0.10
      leave_top1_locus_empirical_p_lt: 0.10
      n_effective_loci_gte: 5
      top1_locus_contribution_lte: 0.35
      top5_locus_contribution_lte: 0.70
    module_status_levels:
      distributed_weak_signal_module_candidate:
        manuscript_role: "candidate distributed weak-signal module"
      top_locus_dominant_module:
        manuscript_role: "sparse/top-locus component; not distributed"
      sparse_locus_pathway_overlap:
        manuscript_role: "supportive only; likely sparse locus overlap"
      raw_gene_set_enrichment_only:
        manuscript_role: "raw enrichment only; no distributed claim"
      negative:
        manuscript_role: "negative_or_limitation"
  ripple_d_v1_4:
    tier_name: "Tier 4D"
    tier_description: "Locus-aware module diagnostics with module-gene-count-preserving nulls"
    primary_change_from_v1_3: "locus null samples the same number of genes per sampled locus as observed in the module"
    required_audit_fields:
      - null_gene_subset_sampling
      - n_module_genes_per_locus
      - null_exact_match_rate
      - null_degree_fallback_rate
      - null_global_fallback_rate
      - min_match_pool_size
      - median_match_pool_size
      - median_genes_per_locus
      - p95_genes_per_locus
      - max_genes_per_locus
      - max_locus_span_bp
    interpretation_boundary: "V1.4 repairs null asymmetry but still requires locus-window and LD-block sensitivity before manuscript-level positive module claims"
  ripple_d_v1_4b:
    tier_name: "Tier 4D"
    tier_description: "Locus-aware module diagnostics with positive-part/rank evidence and locus-window sensitivity"
    primary_change_from_v1_4: "adds positive-part and rank-locus null-calibrated statistics, requires RIPPLE-D empirical support for the strongest hard-gate label, and reports pseudo-locus sensitivity"
    hard_gate:
      locus_robust_empirical_p_lt: 0.05
      ripple_d_empirical_p_lt: 0.05
      moderate_locus_burden_empirical_p_lt: 0.10
      leave_top1_locus_empirical_p_lt: 0.10
      positive_locus_or_rank_locus_empirical_p_lt: 0.05
      n_effective_loci_gte: 5
      top1_locus_contribution_lte: 0.35
      top5_locus_contribution_lte: 0.70
    module_status_levels:
      distributed_weak_signal_module_candidate:
        manuscript_role: "strongest diagnostic candidate; requires locus-window stability before final biological claim"
      mixed_sparse_distributed_candidate:
        manuscript_role: "diagnostic/supportive only; mixed sparse and distributed evidence"
      moderate_locus_supported_module:
        manuscript_role: "diagnostic/supportive only; moderate-locus burden without full distributed gate"
      rank_locus_supported_module:
        manuscript_role: "deprecated V1.4b label; use module_specific_rank_supported_module"
      top_locus_dominant_module:
        manuscript_role: "sparse/top-locus component; not distributed"
      sparse_locus_pathway_overlap:
        manuscript_role: "supportive only; likely sparse locus overlap"
      raw_gene_set_enrichment_only:
        manuscript_role: "legacy raw enrichment only; no distributed claim"
      negative:
        manuscript_role: "negative_or_limitation"
    required_sensitivity:
      - locus_window_grid
      - pseudo_locus_background_audit
      - positive_locus_empirical_p
      - rank_locus_empirical_p
  ripple_d_v1_4c:
    tier_name: "Tier 4D"
    tier_description: "Locus-aware module diagnostics with module-specific rank evidence and degraded-null audit"
    primary_change_from_v1_4b: "separates locus-membership rank from module-specific rank, audits replacement sampling, isolates legacy full-locus nulls, and exposes annotation-free/external-locus interfaces"
    hard_gate:
      locus_robust_empirical_p_lt: 0.05
      ripple_d_empirical_p_lt: 0.05
      positive_locus_or_module_specific_rank_empirical_p_lt: 0.05
      moderate_locus_burden_empirical_p_lt: 0.10
      leave_top1_locus_empirical_p_lt: 0.10
      n_effective_loci_gte: 5
      top1_locus_contribution_lte: 0.35
      top5_locus_contribution_lte: 0.70
    required_output_fields:
      - module_specific_rank_empirical_p
      - locus_membership_rank_empirical_p
      - null_with_replacement_rate
      - null_gene_count_match_degraded
      - annotation_matching_enabled
      - ld_block_locus_sensitivity_status
      - pseudo_locus_window_stability_status
      - rank_evidence_interpretation
    module_status_levels:
      distributed_weak_signal_module_candidate:
        manuscript_role: "diagnostic strongest candidate only until locus-definition sensitivity is complete"
      mixed_sparse_distributed_candidate:
        manuscript_role: "diagnostic/supportive only"
      moderate_locus_supported_module:
        manuscript_role: "diagnostic/supportive only"
      module_specific_rank_supported_module:
        manuscript_role: "diagnostic/supportive only; module-specific rank support without full gate"
      top_locus_dominant_module:
        manuscript_role: "sparse/top-locus component; not distributed"
      sparse_locus_pathway_overlap:
        manuscript_role: "supportive only; likely sparse locus overlap"
      raw_gene_set_enrichment_only:
        manuscript_role: "legacy raw enrichment only; no distributed claim"
      negative:
        manuscript_role: "negative_or_limitation"
    manuscript_upgrade_requires:
      - module_specific_rank_support
      - positive_part_support
      - ripple_d_support
      - leave_top1_support
      - locus_window_stability
      - external_ld_block_or_clumped_locus_sensitivity
  ripple_d_v1_5:
    tier_name: "Tier 4D"
    tier_description: "Manuscript-readiness audit for locus-aware distributed module diagnostics"
    primary_change_from_v1_4c: "hard-blocks degraded nulls from strongest module labels, adds claim-readiness summary fields, supports public score manifests, and audits module overlap redundancy"
    hard_blocking_status:
      null_degraded_unresolved:
        trigger: "null_gene_count_match_degraded is true in manuscript mode"
        manuscript_role: "unresolved null-quality limitation; cannot support distributed weak-signal module claim"
    required_claim_readiness_fields:
      - pseudo_locus_window_stability_status
      - ld_block_locus_sensitivity_status
      - annotation_matching_sensitivity_status
      - rank_evidence_interpretation
      - manuscript_claim_ready
      - downgrade_reason
      - module_overlap_cluster_id
      - representative_module_in_cluster
      - max_jaccard_to_higher_ranked_module
      - unique_locus_fraction
      - redundancy_downgrade_reason
    manuscript_ready_requires:
      - no_null_degraded_unresolved_status
      - stable_pseudo_locus_window_support
      - external_ld_block_or_clumped_locus_sensitivity
      - module_specific_rank_support
      - no_overlap_redundancy_downgrade
    interpretation_boundary: "V1.5 remains a diagnostic repair layer; final positive biological module claims require high-null validation and external locus sensitivity."
